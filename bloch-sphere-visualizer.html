<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Bloch Sphere</title>
    <style>
        body { margin: 0; background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);
            padding: 24px; border-radius: 16px; width: 280px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .slider-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: #94a3b8; }
        input[type=range] { width: 100%; accent-color: #38bdf8; cursor: pointer; }
        .stats { border-top: 1px solid #334155; padding-top: 15px; font-family: monospace; }
        .prob { color: #38bdf8; font-weight: bold; }
        h3 { margin: 0 0 15px 0; font-size: 1.2rem; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

<div id="ui">
    <h3>Bloch Sphere</h3>
    <div class="slider-group">
        <label id="lbl-re">Re(α): 1.00</label>
        <input type="range" id="re-alpha" min="-1" max="1" step="0.01" value="1">
    </div>
    <div class="slider-group">
        <label id="lbl-im">Im(α): 0.00</label>
        <input type="range" id="im-alpha" min="-1" max="1" step="0.01" value="0">
    </div>
    <div class="slider-group">
        <label id="lbl-beta">β (Real): 0.00</label>
        <input type="range" id="beta" min="-1" max="1" step="0.01" value="0">
    </div>
    <div class="stats">
        P(0) = <span id="p0" class="prob">1.000</span><br>
        P(1) = <span id="p1" class="prob">0.000</span>
    </div>
</div>

<div id="canvas-container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. Scene & Camera Setup
    const scene = new THREE.Scene();
    const container = document.getElementById('canvas-container');
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(1.5, 1, 2);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 2. Objects
    // Grid 구체
    const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(1, 32, 32),
        new THREE.MeshBasicMaterial({ color: 0x475569, wireframe: true, transparent: true, opacity: 0.2 })
    );
    scene.add(sphere);

    // 적도 (Equator)
    const ring = new THREE.Mesh(
        new THREE.TorusGeometry(1, 0.005, 16, 100),
        new THREE.MeshBasicMaterial({ color: 0x475569 })
    );
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);

    // 축 (Axes)
    const axes = new THREE.AxesHelper(1.3);
    scene.add(axes);

    // 상태 벡터 화살표
    let arrow = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 0), 1, 0x38bdf8, 0.15, 0.08);
    scene.add(arrow);

    // 조명
    const light = new THREE.PointLight(0xffffff, 20);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    // 3. Logic
    const reIn = document.getElementById('re-alpha');
    const imIn = document.getElementById('im-alpha');
    const beIn = document.getElementById('beta');

    function update() {
        let ar = parseFloat(reIn.value);
        let ai = parseFloat(imIn.value);
        let br = parseFloat(beIn.value);

        // 정규화 (Normalization)
        let norm = Math.sqrt(ar*ar + ai*ai + br*br);
        if(norm === 0) { ar = 1; norm = 1; }
        
        const a_re = ar/norm, a_im = ai/norm, b_re = br/norm;

        // Bloch Vector: x, y, z
        const x = 2 * (a_re * b_re);
        const y = 2 * (a_im * b_re);
        const z = (a_re**2 + a_im**2) - (b_re**2);

        // UI Update
        document.getElementById('lbl-re').innerText = `Re(α): ${a_re.toFixed(2)}`;
        document.getElementById('lbl-im').innerText = `Im(α): ${a_im.toFixed(2)}`;
        document.getElementById('lbl-beta').innerText = `β (Real): ${b_re.toFixed(2)}`;
        document.getElementById('p0').innerText = (a_re**2 + a_im**2).toFixed(3);
        document.getElementById('p1').innerText = (b_re**2).toFixed(3);

        // Vector Update (Three.js Y-up -> Bloch Z-up mapping)
        arrow.setDirection(new THREE.Vector3(x, z, -y).normalize());
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    // Event Listeners
    [reIn, imIn, beIn].forEach(el => el.addEventListener('input', update));
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    update();
    animate();
</script>
</body>
</html>
